<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Golf Nerd Leagues — 2026 Season</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Brand palette */
  --deep-rough:#1A3D2B;
  --fairway:#2E7D52;
  --the-green:#7EC8A0;
  --fog:#F7F9F5;
  --gnerd-gold:#E9C84D;
  --gold-tint:#FFF3CC;
  /* Derived */
  --deep-rough-light:#244a35;
  --fairway-dark:#236841;
  --the-green-light:#a8dcc0;
  --the-green-pale:#d5f0e2;
  --fog-dark:#e8ede5;
  /* Semantic */
  --text:#1a1a1a;--text-muted:#5a6058;--text-light:#8a8f8a;
  --danger:#c0392b;
  --wins-bg:var(--gold-tint);--wins-text:#856508;
  --bucks-bg:var(--gnerd-gold);--bucks-text:#5C3D05;
  --card-bg:#ffffff;--card-border:#dfe3da;--card-shadow:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.03);
  --radius:10px;--radius-lg:14px;
  --nav-h:56px;
  --major-gradient:linear-gradient(135deg,#E9C84D,#FFF3CC,#E9C84D);
}
html{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--fog);color:var(--text);-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,20px) + 12px);min-height:100dvh}

/* === HEADER === */
.site-header{background:var(--deep-rough);color:#fff;padding:20px 16px 16px;position:relative;overflow:hidden}
.site-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 30px,rgba(255,255,255,.015) 30px,rgba(255,255,255,.015) 31px);pointer-events:none}
.site-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--major-gradient)}
.header-inner{max-width:600px;margin:0 auto;position:relative}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.brand-icon{width:40px;height:40px;flex-shrink:0}
.brand h1{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;letter-spacing:-.3px;line-height:1.2}
.brand-sub{font-size:12px;color:var(--the-green);letter-spacing:.5px;text-transform:uppercase;margin-left:50px;margin-top:-2px}
.league-name{display:inline-block;margin-left:50px;margin-top:6px;background:var(--gnerd-gold);color:var(--deep-rough);font-size:12px;font-weight:700;letter-spacing:.5px;padding:3px 10px;border-radius:4px}
.season-badge{position:absolute;top:0;right:0;background:var(--fairway);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;letter-spacing:.3px;color:#ffffff}

/* === LIVE DATA INDICATOR === */
.data-status{max-width:600px;margin:0 auto;padding:6px 16px 0;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-light)}
.data-status .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.data-status .dot.live{background:var(--fairway);box-shadow:0 0 4px var(--fairway)}
.data-status .dot.offline{background:var(--danger)}
.data-status .dot.loading{background:var(--gnerd-gold);animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.data-status button{background:none;border:none;color:var(--fairway);font-size:11px;font-weight:600;cursor:pointer;padding:0;text-decoration:underline}

/* === NAV === */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));background:var(--deep-rough);border-top:1px solid var(--deep-rough-light);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--the-green);font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;background:none;border:none;cursor:pointer;transition:color .15s;-webkit-tap-highlight-color:transparent;position:relative}
.nav-btn.active{color:var(--gnerd-gold)}
.nav-btn.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--gnerd-gold);border-radius:0 0 2px 2px}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* === PAGES === */
.page{display:none;max-width:600px;margin:0 auto;padding:12px 12px 20px}
.page.active{display:block}
.page-title{font-family:'DM Serif Display',serif;font-size:20px;margin:12px 4px 12px;color:var(--deep-rough)}

/* === CARDS === */
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-lg);box-shadow:var(--card-shadow);overflow:hidden;margin-bottom:12px}
.card-header{padding:12px 14px 10px;border-bottom:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center}
.card-header h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)}
.card-header .badge{font-size:12px;font-weight:500;background:var(--the-green-pale);color:var(--fairway);padding:2px 8px;border-radius:20px}

/* === PILL BADGES (Wins + GNerd Bucks) === */
.pill{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.pill-wins{background:var(--wins-bg);color:var(--wins-text)}
.pill-bucks{background:var(--bucks-bg);color:var(--bucks-text)}

/* === LEADERBOARD === */
.lb-row{display:grid;grid-template-columns:32px 1fr auto;align-items:center;padding:10px 14px;border-bottom:1px solid var(--fog-dark);gap:10px;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.lb-row:last-child{border-bottom:none}
.lb-row:active{background:var(--the-green-pale)}
.lb-rank{font-size:15px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--fairway);text-align:center}
.lb-rank.gold{color:var(--bucks-text);font-weight:700}
.lb-info{min-width:0}
.lb-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-meta{font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.lb-pts{text-align:right}
.lb-pts-num{font-size:20px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--deep-rough);line-height:1}
.lb-pts-label{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;text-align:right}
.lb-movement{display:inline-flex;align-items:center;font-size:11px;font-weight:600;gap:1px}
.lb-movement.up{color:var(--fairway)}
.lb-movement.down{color:var(--danger)}
.lb-movement.same{color:var(--text-light)}

/* Latest Result Banner */
.latest-result{background:var(--deep-rough-light);color:#fff;border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.latest-result .label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--the-green);margin-bottom:4px}
.latest-result .tourney{font-family:'DM Serif Display',serif;font-size:17px;margin-bottom:2px}
.latest-result .detail{font-size:12px;color:var(--the-green-light)}

/* Prize Pool */
.prize-pool{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.lb-season-bonus{font-size:10px;font-weight:600;color:var(--bucks-text);background:var(--gold-tint);padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block}
.prize-box{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:10px;text-align:center}
.prize-box .amount{font-size:18px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--deep-rough)}
.prize-box .desc{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* === TOURNAMENT RESULTS === */
.tourney-card{margin-bottom:10px}
.tourney-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tourney-header:active{background:var(--fog)}
.tourney-name{font-weight:600;font-size:14px;line-height:1.3}
.tourney-date{font-size:12px;color:var(--text-muted);margin-top:2px}
.tourney-prize{flex-shrink:0;margin-left:10px;font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;padding:3px 8px;border-radius:20px}
.tourney-prize.cash{background:var(--gold-tint);color:var(--bucks-text)}
.tourney-prize.major{background:var(--gnerd-gold);color:var(--bucks-text)}
.tourney-prize.pts-only{background:var(--fog-dark);color:var(--text-muted)}
.tourney-prize.no-winner{background:#fef0ef;color:var(--danger)}
.tourney-body{display:none;padding:0 14px 12px}
.tourney-card.open .tourney-body{display:block}
.tourney-card.open .tourney-header{border-bottom:1px solid var(--card-border)}
.scorer-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--fog-dark);gap:8px}
.scorer-row:last-child{border-bottom:none}
.scorer-pts{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0}
.scorer-pts.p5{background:var(--fairway);color:#fff}
.scorer-pts.p4{background:var(--the-green);color:var(--deep-rough)}
.scorer-pts.p3{background:var(--the-green-light);color:var(--deep-rough)}
.scorer-pts.p2{background:var(--the-green-pale);color:var(--fairway)}
.scorer-pts.p1{background:var(--fog-dark);color:var(--text-muted)}
.scorer-name{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.scorer-team{font-size:11px;color:var(--text-muted);flex-shrink:0}
.scorer-winner{background:var(--gold-tint);border-radius:6px;padding:6px 8px;margin:2px 0}
.scorer-gb-badge{font-size:11px;font-weight:600;color:var(--wins-text);flex-shrink:0;text-align:right;white-space:nowrap}
.upcoming-tag{font-size:11px;color:var(--text-light);font-style:italic}

/* Completed vs upcoming styling */
.tourney-card.upcoming{opacity:.6}
.tourney-card.upcoming .tourney-header{cursor:default}

/* === TEAM ROSTERS === */
.team-select{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;padding:0 2px}
.team-chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--card-border);background:var(--card-bg);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.team-chip.active{background:var(--deep-rough);color:#fff;border-color:var(--deep-rough)}
.team-chip:active{transform:scale(.96)}
.roster-panel{display:none}
.roster-panel.active{display:block}
.roster-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.roster-stat{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:10px;text-align:center}
.roster-stat .val{font-size:22px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--deep-rough)}
.roster-stat .label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.golfer-row{display:grid;grid-template-columns:28px 1fr auto;align-items:center;padding:10px 14px;border-bottom:1px solid var(--fog-dark);gap:10px}
.golfer-row:last-child{border-bottom:none}
.golfer-pick{font-size:11px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--text-light);text-align:center;min-width:22px}
.golfer-name{font-size:14px;font-weight:500}
.golfer-scores{font-size:11px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.golfer-total{font-size:16px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--deep-rough)}

/* === SCHEDULE === */
.schedule-month{margin-bottom:16px}
.schedule-month h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--fairway);padding:0 4px 6px;border-bottom:2px solid var(--the-green-light);margin-bottom:4px}
.sched-row{display:flex;align-items:center;padding:8px 4px;border-bottom:1px solid var(--fog-dark);gap:10px}
.sched-row:last-child{border-bottom:none}
.sched-date{font-size:11px;color:var(--text-muted);width:80px;flex-shrink:0}
.sched-name{font-size:13px;font-weight:500;flex:1;min-width:0}
.sched-name.major{color:var(--bucks-text);font-weight:700}
.sched-status{flex-shrink:0;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.sched-status.done{background:var(--the-green-pale);color:var(--fairway)}
.sched-status.next{background:var(--gold-tint);color:var(--bucks-text);animation:pulse 2s ease-in-out infinite}
.sched-status.future{background:var(--fog-dark);color:var(--text-light)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* === TEAM DETAIL MODAL === */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--fog);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:85dvh;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom,20px);animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:#ccc;border-radius:2px;margin:10px auto 0}
.modal-header{padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--fog);z-index:1}
.modal-header h2{font-family:'DM Serif Display',serif;font-size:20px}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--card-border);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.modal-body{padding:0 16px 20px}

/* Utilities */
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
@media(min-width:640px){
  .page{padding:16px 20px 24px}
  .site-header{padding:24px 20px 20px}
}
</style>
</head>

</header>

<!-- DATA STATUS BAR -->
<div class="data-status" id="data-status">

</div>

<!-- PAGES -->
<main>

<div class="page active" id="page-leaderboard">

    <div id="leaderboard-list"></div>
  </div>
</div>

<!-- RESULTS PAGE -->
<div class="page" id="page-results">
  <div class="page-title">Tournament Results</div>
  <div id="results-list"></div>
</div>

<!-- ROSTERS PAGE -->
<div class="page" id="page-rosters">
  <div class="page-title">Team Rosters</div>
  <div class="team-select" id="team-chips"></div>
  <div id="roster-panels"></div>
</div>

<!-- SCHEDULE PAGE -->
<div class="page" id="page-schedule">
  <div class="page-title">2026 Schedule</div>
  <div id="schedule-list"></div>
</div>

</main>

<!-- TEAM DETAIL MODAL -->
<div class="modal-overlay" id="team-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>

      <button class="modal-close" onclick="closeModal()">&times;</button>

  </div>
</div>

<nav class="bottom-nav">

    Standings
  </button>

    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>

// Draft order maps team number (pick position) to team name

let LEADERBOARD = [];
let TEAMS = {};

// =============================================
// GOOGLE SHEETS FETCH + PARSE
// =============================================

/** Convert an HTML <table> into a 2D string array, expanding colspan/rowspan */
function tableToArray(table) {
  const grid = [];
  const rows = table.querySelectorAll('tr');

  rows.forEach((tr, ri) => {
    if (!grid[ri]) grid[ri] = [];
    const cells = tr.querySelectorAll('td, th');

    cells.forEach(cell => {
      // Find next open column in this row
      let ci = 0;
      while (grid[ri][ci] !== undefined) ci++;

      const text = (cell.textContent || '').trim();
      const colspan = parseInt(cell.getAttribute('colspan')) || 1;
      const rowspan = parseInt(cell.getAttribute('rowspan')) || 1;

      for (let r = 0; r < rowspan; r++) {
        for (let c = 0; c < colspan; c++) {
          if (!grid[ri + r]) grid[ri + r] = [];
          grid[ri + r][ci + c] = (r === 0 && c === 0) ? text : '';
        }
      }
    });
  });

  return grid;
}

/** Identify which table belongs to which sheet by scanning content */
function identifySheets(tables) {
  const sheets = { leaderboard: null, scoreboard: null, draft: null };

  for (const table of tables) {
    const arr = tableToArray(table);
    if (!arr || arr.length < 3) continue;

    // Flatten first 3 rows to text for pattern matching
    const top = arr.slice(0, 6).map(r => (r || []).join(' ').toLowerCase()).join(' ');

    if (top.includes('last week') && top.includes('rank') && top.includes('team') && top.includes('points') && !sheets.leaderboard) {
      sheets.leaderboard = arr;
    } else if (top.includes('date') && top.includes('tournament') && top.includes('location') && !sheets.scoreboard) {
      // Prefer the one with "2026" content or the largest table
      if (!sheets.scoreboard || arr.length > sheets.scoreboard.length) {
        sheets.scoreboard = arr;
      }
    } else if (top.includes('pick') && top.includes('round 1') && top.includes('round 2') && !sheets.draft) {
      sheets.draft = arr;
    }
  }

  return sheets;
}

/** Parse leaderboard 2D array into LEADERBOARD data */
function parseLeaderboard(arr) {
  // Find header row
  let hdr = -1;
  for (let i = 0; i < Math.min(5, arr.length); i++) {
    const row = (arr[i] || []).map(c => (c || '').toLowerCase());
    if (row.includes('rank') && row.includes('team')) { hdr = i; break; }
  }
  if (hdr === -1) return null;

  const headers = arr[hdr].map(c => (c || '').toLowerCase().trim());
  console.log('Leaderboard headers:', headers);
  const col = {
    lastWeek: headers.findIndex(h => h === 'last week' || h === 'lw' || h === 'prev' || h === 'previous' || h.includes('last wk') || h.includes('prior')),
    rank:     headers.indexOf('rank'),
    team:     headers.indexOf('team'),
    points:   headers.indexOf('points'),
    wins:     headers.indexOf('wins'),
    cash:     headers.findIndex(h => h.includes('weekly') || h.includes('gnerd bucks') || h.includes('cash') || h.includes('winnings') || h.includes('gb won')),
    topPayout:headers.findIndex(h => h.includes('top team') || h.includes('top payout') || h.includes('season bonus')),
    total:    headers.indexOf('total'),
  };
  console.log('Leaderboard column indices:', col);

  function cleanNum(val) { return parseInt(String(val || '').replace(/[$,]/g, '')) || 0; }

  const teams = [];
  for (let i = hdr + 1; i < arr.length; i++) {
    const r = arr[i];
    if (!r) break;
    const team = (r[col.team] || '').trim();
    if (!team) break;
    teams.push({
      rank:     cleanNum(r[col.rank]) || teams.length + 1,
      lastWeek: cleanNum(r[col.lastWeek]),
      team,
      owner:    OWNER_MAP[team] || team,
      points:   cleanNum(r[col.points]),
      wins:     cleanNum(r[col.wins]),
      cash:     cleanNum(r[col.cash]),
      topPayout:cleanNum(r[col.topPayout]),
      total:    cleanNum(r[col.total]),
    });
  }
  return teams.length ? teams : null;
}

/** Parse draft 2D array to get team# -> team name mapping */
function parseDraft(arr) {
  const map = {};
  for (let i = 0; i < arr.length; i++) {
    const r = arr[i];
    if (!r) continue;
    const pick = (r[0] || '').trim();
    const team = (r[1] || '').trim();
    const m = pick.match(/^#(\d+)$/);
    if (m && team) map[parseInt(m[1])] = team;
  }
  return Object.keys(map).length ? map : DRAFT_ORDER;
}

/** Parse scoreboard 2D array into TOURNAMENTS + TEAMS data */
function parseScoreboard(arr, draftMap, leaderboard) {
  // --- Locate header rows ---
  // Row with "Date" in col A → dateRow (has tournament dates)
  // Next row with "Tournament" → nameRow
  // Next row with "Location" → locRow
  // Row with "Prize" → prizeRow
  let dateRow = -1, nameRow = -1, locRow = -1, prizeRow = -1;

  for (let i = 0; i < Math.min(10, arr.length); i++) {
    const a = (arr[i]?.[0] || '').toLowerCase().trim();
    if (a === 'date') dateRow = i;
    if (a === 'tournament') nameRow = i;
    if (a === 'location') locRow = i;
    if (a === 'prize') prizeRow = i;
  }
  if (nameRow === -1) return null;
  if (dateRow === -1) dateRow = nameRow - 1;
  if (locRow === -1) locRow = nameRow + 1;
  if (prizeRow === -1) prizeRow = locRow + 2;

  // --- Find tournament columns (look for non-empty in nameRow, starting from col 5+) ---
  const tourneyInfos = [];
  for (let c = 3; c < (arr[nameRow] || []).length; c++) {
    const name = (arr[nameRow][c] || '').trim();
    if (!name) continue;
    if (name.toLowerCase() === 'tournament') continue;
    tourneyInfos.push({
      col: c,
      name,
      date: (arr[dateRow]?.[c] || '').trim(),
      location: (arr[locRow]?.[c] || '').trim(),
      prize: (arr[prizeRow]?.[c] || '').trim(),
    });
  }

  // --- Find team blocks: scan column A for "#N" pattern ---
  const teamBlocks = [];
  for (let r = 0; r < arr.length; r++) {
    const cell = (arr[r]?.[0] || '').trim();
    const m = cell.match(/^#(\d+)$/);
    if (m) teamBlocks.push({ row: r, num: parseInt(m[1]) });
  }

  // --- Figure out column indices for Pick, Golfer, Total ---
  // Look for a header row with "Pick #" / "GOLFER" / "TOTAL" just before first team block
  let pickCol = 2, golferCol = 3, totalCol = 4; // defaults matching known structure
  for (let r = Math.max(0, (teamBlocks[0]?.row || 6) - 3); r < (teamBlocks[0]?.row || 6); r++) {
    const row = (arr[r] || []).map(c => (c || '').toLowerCase().trim());
    const gi = row.findIndex(c => c === 'golfer');
    if (gi !== -1) {
      golferCol = gi;
      const pi = row.findIndex(c => c.includes('pick'));
      if (pi !== -1) pickCol = pi;
      const ti = row.findIndex(c => c === 'total');
      if (ti !== -1) totalCol = ti;
      break;
    }
  }

  // --- Extract golfer data per team ---
  const teamData = {};
  for (let tb = 0; tb < teamBlocks.length; tb++) {
    const startRow = teamBlocks[tb].row;
    const teamNum = teamBlocks[tb].num;
    const teamName = draftMap[teamNum] || `Team ${teamNum}`;
    const golfers = [];

    for (let offset = 0; offset < 10; offset++) {
      const r = startRow + offset;
      if (r >= arr.length) break;
      const row = arr[r] || [];

      const name = (row[golferCol] || '').trim().replace(/\*$/, '');
      if (!name) continue;

      const pick = parseInt(row[pickCol]) || (offset + 1);
      const total = parseInt(row[totalCol]) || 0;

      const scores = {};
      for (const t of tourneyInfos) {
        const val = parseInt(row[t.col]);
        if (val > 0) scores[t.name] = val;
      }

      golfers.push({ name, pick, total, scores });
    }

    const lb = leaderboard?.find(t => t.team === teamName);
    teamData[teamName] = {
      golfers,
      wins: lb?.wins || 0,
      cash: lb?.cash || 0,
      totalPoints: lb?.points || golfers.reduce((s, g) => s + g.total, 0),
    };
  }

  // --- Build tournament results ---
  const tournaments = tourneyInfos.map(t => {
    const scorers = [];
    for (const [teamName, td] of Object.entries(teamData)) {
      for (const g of td.golfers) {
        if (g.scores[t.name]) {
          scorers.push({ g: g.name, t: teamName, p: g.scores[t.name] });
        }
      }
    }
    scorers.sort((a, b) => b.p - a.p);

    const completed = scorers.length > 0;
    let prizeRaw = String(t.prize || '').replace(/[$,\s]/g, '').trim();
    let prize = /^\d+(\.\d+)?$/.test(prizeRaw) ? parseInt(prizeRaw) : t.prize;
    // Normalize string prizes — strip any remaining $ signs
    if (typeof prize === 'string') prize = prize.replace(/[$]/g, '').trim();
    if (typeof prize === 'string' && /^\d+$/.test(prize)) prize = parseInt(prize);

    // Determine weekly winner — team with a 5-point (1st place) scorer wins GNerd Bucks
    let winner = null;
    if (completed && typeof prize === 'number') {
      const fivePointScorer = scorers.find(s => s.p === 5);
      if (fivePointScorer) {
        winner = fivePointScorer.t;
      }
    }

    const major = MAJOR_NAMES.some(m => t.name.toLowerCase().includes(m));

    return { name: t.name, date: t.date, location: t.location, prize, completed, scorers, winner, major };
  });

  return { tournaments, teamData };
}

// ---- CSV Parser ----
function parseCSV(text) {
  const rows = [];
  let cur = '', inQ = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(cur); cur = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i+1] === '\n')) {
        row.push(cur); cur = ''; rows.push(row); row = [];
        if (ch === '\r') i++;
      } else if (ch === '\r') { row.push(cur); cur = ''; rows.push(row); row = []; }
      else cur += ch;
    }
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

// ---- GID Discovery: fetch pubhtml page, extract sheet name->gid mapping ----
async function discoverGIDs() {
  const resp = await fetch(CONFIG.BASE_URL + '/pubhtml');
  if (!resp.ok) throw new Error('pubhtml ' + resp.status);
  const html = await resp.text();
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const map = {};
  // Sheet menu: <li id="sheet-button-GID"><a>Sheet Name</a></li>
  doc.querySelectorAll('[id^="sheet-button-"]').forEach(li => {
    const gid = li.id.replace('sheet-button-', '');
    const name = (li.textContent || '').trim();
    if (gid && name) map[name] = gid;
  });
  return map;
}

// ---- Fetch a single sheet as CSV by GID ----
async function fetchSheetCSV(gid) {
  // Try CSV first, then TSV as fallback
  var url = CONFIG.BASE_URL + '/pub?gid=' + gid + '&single=true&output=csv';
  var resp = await fetch(url, { redirect: 'follow' });
  if (!resp.ok) {
    // Some published sheets only serve TSV
    url = CONFIG.BASE_URL + '/pub?gid=' + gid + '&single=true&output=tsv';
    resp = await fetch(url, { redirect: 'follow' });
    if (!resp.ok) throw new Error('CSV/TSV gid=' + gid + ' HTTP ' + resp.status);
    var text = await resp.text();
    // Convert TSV to CSV
    return parseCSV(text.replace(/\t/g, ','));
  }
  return parseCSV(await resp.text());
}

/** Main fetch: tries CSV-per-sheet (best CORS support), falls back to pubhtml HTML parsing */
async function fetchLiveData() {
  // Check cache
  try {
    const cached = localStorage.getItem(CONFIG.CACHE_KEY);
    if (cached) {
      const { data, ts } = JSON.parse(cached);
      if (Date.now() - ts < CONFIG.CACHE_TTL) return data;
    }
  } catch (e) {}

  let sheets = { leaderboard: null, scoreboard: null, draft: null };

  // ── Primary strategy: Fetch CSVs using hardcoded GIDs ──
  try {
    const results = await Promise.all([
      fetchSheetCSV(CONFIG.GIDS.leaderboard),
      fetchSheetCSV(CONFIG.GIDS.scoreboard),
      fetchSheetCSV(CONFIG.GIDS.draft),
    ]);
    sheets.leaderboard = results[0];
    sheets.scoreboard  = results[1];
    sheets.draft       = results[2];
    console.log('CSV fetch succeeded via hardcoded GIDs');
  } catch (e1) {
    console.warn('Primary fetch (hardcoded GIDs) failed:', e1.message);

    // ── Fallback: Try GID discovery from pubhtml ──
    try {
      const gidMap = await discoverGIDs();
      console.log('Discovered GIDs:', gidMap);
      const lbGid = gidMap['2026 Leaderboard'];
      const sbGid = gidMap['2026 Season Scoreboard'];
      const drGid = gidMap['2026 DRAFT'];
      if (lbGid && sbGid) {
        const fetches = [fetchSheetCSV(lbGid), fetchSheetCSV(sbGid)];
        if (drGid) fetches.push(fetchSheetCSV(drGid));
        const results = await Promise.all(fetches);
        sheets.leaderboard = results[0];
        sheets.scoreboard  = results[1];
        if (results[2]) sheets.draft = results[2];
        console.log('CSV fetch succeeded via GID discovery');
      } else {
        throw new Error('GIDs not found');
      }
    } catch (e2) {
      console.warn('Fallback (GID discovery) failed:', e2.message);
      throw new Error('All fetch strategies failed. Check that the Google Sheet is published to web.');
    }
  }

  if (!sheets.leaderboard) throw new Error('Leaderboard sheet not found');
  if (!sheets.scoreboard) throw new Error('Scoreboard sheet not found');

  // Parse the 2D arrays into app data
  const draftMap = sheets.draft ? parseDraft(sheets.draft) : DRAFT_ORDER;
  const leaderboard = parseLeaderboard(sheets.leaderboard);
  if (!leaderboard) throw new Error('Could not parse leaderboard');

  const sbResult = parseScoreboard(sheets.scoreboard, draftMap, leaderboard);
  if (!sbResult) throw new Error('Could not parse scoreboard');

  const result = {
    leaderboard,
    teams: sbResult.teamData,
    tournaments: sbResult.tournaments,
  };

  // Cache
  try {
    localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({ data: result, ts: Date.now() }));
  } catch (e) {}

  return result;
}

// =============================================
// RENDERING
// =============================================

function getMovement(rank, lastWeek) {
  if (!lastWeek || lastWeek <= 0) return '';
  const diff = lastWeek - rank;
  if (diff > 0) return '<span class="lb-movement up">\u25B2' + diff + '</span>';
  if (diff < 0) return '<span class="lb-movement down">\u25BC' + Math.abs(diff) + '</span>';
  return '';
}

function renderLeaderboard() {
  // Latest result banner
  const lastCompleted = [...TOURNAMENTS].reverse().find(t => t.completed);
  if (lastCompleted) {
    const banner = document.getElementById('latest-banner');
    const winnerText = lastCompleted.winner
      ? 'GNerd Bucks: ' + lastCompleted.winner + ' \u00B7 ' + (lastCompleted.scorers[0]?.g || '') + ' (' + lastCompleted.scorers[0]?.p + 'pts)'
      : 'No GNerd Bucks this week';
    banner.innerHTML =
      '<div class="label">Latest Result</div>' +
      '<div class="tourney">' + lastCompleted.name + '</div>' +
      '<div class="detail">' + lastCompleted.date + ' \u00B7 ' + winnerText + '</div>';
  }

  // Events done counter
  const done = TOURNAMENTS.filter(t => t.completed).length;
  document.getElementById('pp-events').textContent = done + '/' + TOURNAMENTS.length;

  // Team count
  document.getElementById('team-count-badge').textContent = LEADERBOARD.length + ' Teams';

  var SEASON_BONUS = {1: 500, 2: 300, 3: 100};
  const list = document.getElementById('leaderboard-list');
  list.innerHTML = LEADERBOARD.map(function(t) {
    var bonus = SEASON_BONUS[t.rank];
    return '<div class="lb-row" onclick="openTeamModal(\'' + t.team.replace(/'/g, "\\'") + '\')">' +
      '<div class="lb-rank ' + (t.rank <= 3 ? 'gold' : '') + '">' + t.rank + '</div>' +
      '<div class="lb-info">' +
        '<div class="lb-name">' + t.team + '</div>' +
        '<div class="lb-meta">' +
          getMovement(t.rank, t.lastWeek) +
          '<span class="pill pill-wins">\uD83C\uDFC6 ' + t.wins + ' Win' + (t.wins !== 1 ? 's' : '') + '</span>' +
          '<span class="pill pill-bucks">\uD83D\uDCB0 ' + t.cash + ' GNerd Bucks</span>' +
        '</div>' +
        (bonus ? '<div class="lb-season-bonus">\uD83C\uDFC6 ' + bonus + ' GB Season Bonus</div>' : '') +
      '</div>' +
      '<div class="lb-pts">' +
        '<div class="lb-pts-num">' + t.points + '</div>' +
        '<div class="lb-pts-label">pts</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderResults() {
  var list = document.getElementById('results-list');
  var completed = TOURNAMENTS.filter(t => t.completed).reverse();
  var upcoming = TOURNAMENTS.filter(t => !t.completed);
  var nextUp = upcoming[0];

  list.innerHTML = completed.map(function(t, i) {
    var prizeClass = typeof t.prize === 'number' ? (t.prize >= 50 ? 'major' : 'cash')
      : (t.prize === 'POINTS ONLY' ? 'pts-only' : 'no-winner');
    var prizeText = typeof t.prize === 'number' ? t.prize + ' GB' : t.prize;
    return '<div class="card tourney-card ' + (i === 0 ? 'open' : '') + '" onclick="toggleTourney(this)">' +
      '<div class="tourney-header">' +
        '<div>' +
          '<div class="tourney-name">' + t.name + '</div>' +
          '<div class="tourney-date">' + t.date + ' \u00B7 ' + t.location + '</div>' +
        '</div>' +
        '<span class="tourney-prize ' + prizeClass + '">' + prizeText + '</span>' +
      '</div>' +
      '<div class="tourney-body">' +
        t.scorers.map(function(s) {
          var isWinner = s.p === 5 && t.winner === s.t;
          return '<div class="scorer-row' + (isWinner ? ' scorer-winner' : '') + '">' +
            '<div class="scorer-pts p' + s.p + '">' + s.p + '</div>' +
            '<div class="scorer-name">' + s.g + '</div>' +
            (isWinner ? '<div class="scorer-gb-badge">\u2B50 GNerd Bucks \u00B7 ' + s.t + '</div>' : '<div class="scorer-team">' + s.t + '</div>') +
          '</div>';
        }).join('') +
      '</div>' +
    '</div>';
  }).join('') +
  '<div class="page-title" style="margin-top:16px">Upcoming</div>' +
  upcoming.map(function(t) {
    var prizeClass = typeof t.prize === 'number' ? (t.prize >= 50 ? 'major' : 'cash')
      : (t.prize === 'POINTS ONLY' ? 'pts-only' : 'no-winner');
    var prizeText = typeof t.prize === 'number' ? t.prize + ' GB' : t.prize;
    var isNext = t === nextUp;
    return '<div class="card tourney-card upcoming">' +
      '<div class="tourney-header">' +
        '<div>' +
          '<div class="tourney-name">' + (t.major ? '\u26F3 ' : '') + t.name + '</div>' +
          '<div class="tourney-date">' + t.date + (t.location ? ' \u00B7 ' + t.location : '') + '</div>' +
        '</div>' +
        '<span class="tourney-prize ' + prizeClass + '">' + (isNext ? 'NEXT' : prizeText) + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleTourney(el) {
  if (el.classList.contains('upcoming')) return;
  el.classList.toggle('open');
}

function renderRosters() {
  var chips = document.getElementById('team-chips');
  var panels = document.getElementById('roster-panels');
  var teamNames = LEADERBOARD.map(t => t.team);

  chips.innerHTML = teamNames.map(function(name, i) {
    return '<button class="team-chip ' + (i === 0 ? 'active' : '') + '" onclick="switchTeam(\'' + name.replace(/'/g, "\\'") + '\', this)">' + name + '</button>';
  }).join('');

  // Reverse lookup: team name → draft position
  var DRAFT_POS = {};
  Object.entries(DRAFT_ORDER).forEach(function(e) { DRAFT_POS[e[1]] = e[0]; });

  panels.innerHTML = teamNames.map(function(name, i) {
    var team = TEAMS[name];
    if (!team) return '';
    var lb = LEADERBOARD.find(t => t.team === name);
    var draftPos = DRAFT_POS[name] || '—';
    var sortedGolfers = [...team.golfers].sort((a, b) => b.total - a.total);
    return '<div class="roster-panel ' + (i === 0 ? 'active' : '') + '" id="roster-' + name.replace(/\s/g, '-') + '">' +
      '<div class="roster-stats">' +
        '<div class="roster-stat"><div class="val">' + team.totalPoints + '</div><div class="label">Points</div></div>' +
        '<div class="roster-stat"><div class="val">' + team.wins + '</div><div class="label">Wins</div></div>' +
        '<div class="roster-stat"><div class="val">#' + (lb?.rank || '—') + '</div><div class="label">Rank</div></div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="card-header"><h3>' + (OWNER_MAP[name] || name) + '</h3><span class="badge">Draft Position: ' + draftPos + '</span></div>' +
        sortedGolfers.map(function(g) {
          var scoreList = Object.entries(g.scores).map(function(e) { return e[0].split(' ').slice(0, 2).join(' ') + ' (' + e[1] + ')'; }).join(', ');
          return '<div class="golfer-row">' +
            '<div class="golfer-pick">R' + g.pick + '</div>' +
            '<div class="lb-info">' +
              '<div class="golfer-name">' + g.name + '</div>' +
              '<div class="golfer-scores">' + (scoreList || '') + '</div>' +
            '</div>' +
            '<div class="golfer-total">' + g.total + '</div>' +
          '</div>';
        }).join('') +
      '</div>' +
    '</div>';
  }).join('');
}

function switchTeam(name, btn) {
  document.querySelectorAll('.team-chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.roster-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  var panel = document.getElementById('roster-' + name.replace(/\s/g, '-'));
  if (panel) panel.classList.add('active');
}

function renderSchedule() {
  var list = document.getElementById('schedule-list');
  var months = {};
  var nextTourney = TOURNAMENTS.find(t => !t.completed);
  var monthMap = {JAN:'January',FEB:'February',MAR:'March',APR:'April',MAY:'May',May:'May',JUN:'June',JUL:'July',AUG:'August',SEP:'September',OCT:'October',NOV:'November',DEC:'December'};

  TOURNAMENTS.forEach(function(t) {
    var monthKey = (t.date || '').split(' ')[0];
    var month = monthMap[monthKey] || monthKey;
    if (!months[month]) months[month] = [];
    months[month].push(t);
  });

  list.innerHTML = Object.entries(months).map(function(entry) {
    var month = entry[0], events = entry[1];
    return '<div class="schedule-month">' +
      '<h3>' + month + '</h3>' +
      events.map(function(t) {
        var isMajor = t.major;
        var isNext = t === nextTourney;
        var statusClass = t.completed ? 'done' : isNext ? 'next' : 'future';
        var statusText = t.completed ? '\u2713' : isNext ? 'NEXT' : t.date.split(' ').slice(1).join(' ');
        return '<div class="sched-row">' +
          '<div class="sched-date">' + t.date + '</div>' +
          '<div class="sched-name ' + (isMajor ? 'major' : '') + '">' + (isMajor ? '\u26F3 ' : '') + t.name + '</div>' +
          '<span class="sched-status ' + statusClass + '">' + statusText + '</span>' +
        '</div>';
      }).join('') +
    '</div>';
  }).join('');
}

// Team detail modal
function openTeamModal(teamName) {
  var team = TEAMS[teamName];
  var lb = LEADERBOARD.find(t => t.team === teamName);
  if (!team || !lb) return;

  document.getElementById('modal-team-name').textContent = teamName;
  var body = document.getElementById('modal-body');
  var sortedGolfers = [...team.golfers].sort((a, b) => b.total - a.total);

  body.innerHTML =
    '<div class="roster-stats">' +
      '<div class="roster-stat"><div class="val">' + team.totalPoints + '</div><div class="label">Points</div></div>' +
      '<div class="roster-stat"><div class="val">' + team.wins + '</div><div class="label">Wins</div></div>' +
      '<div class="roster-stat"><div class="val">' + lb.cash + '</div><div class="label">GNerd Bucks</div></div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="card-header"><h3>Roster</h3><span class="badge">Rank #' + lb.rank + '</span></div>' +
      sortedGolfers.map(function(g) {
        var scoreList = Object.entries(g.scores).map(function(e) { return e[0].split(' ').slice(0, 3).join(' ') + ' (' + e[1] + ')'; }).join(', ');
        return '<div class="golfer-row">' +
          '<div class="golfer-pick">R' + g.pick + '</div>' +
          '<div class="lb-info">' +
            '<div class="golfer-name">' + g.name + '</div>' +
            '<div class="golfer-scores">' + (scoreList || '') + '</div>' +
          '</div>' +
          '<div class="golfer-total">' + g.total + '</div>' +
        '</div>';
      }).join('') +
    '</div>';

  document.getElementById('team-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('team-modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('team-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Navigation
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelector('[data-page="' + page + '"]').classList.add('active');
  window.scrollTo(0, 0);
}

function renderAll() {
  renderLeaderboard();
  renderResults();
  renderRosters();
  renderSchedule();
}

// =============================================
// STATUS INDICATOR
// =============================================
function setStatus(type, msg) {
  var dot = document.getElementById('status-dot');
  var text = document.getElementById('status-text');
  dot.className = 'dot ' + type;
  text.textContent = msg;
}

// =============================================
// INITIALIZATION
// =============================================
(async function init() {
  // Set league name from config
  if (CONFIG.LEAGUE_NAME) {
    document.getElementById('league-name').textContent = CONFIG.LEAGUE_NAME;
  }

  // 1. Render immediately with fallback data
  LEADERBOARD = FALLBACK_LEADERBOARD;
  TEAMS = FALLBACK_TEAMS;
  TOURNAMENTS = FALLBACK_TOURNAMENTS;
  renderAll();

  // 2. Try fetching live data
  try {
    setStatus('loading', 'Loading live data...');
    var data = await fetchLiveData();

    if (data.leaderboard && data.leaderboard.length > 0) {
      // Add owner field if missing
      data.leaderboard.forEach(function(t) {
        if (!t.owner) t.owner = OWNER_MAP[t.team] || t.team;
      });

      LEADERBOARD = data.leaderboard;
      TEAMS = data.teams;
      TOURNAMENTS = data.tournaments;
      renderAll();

      var now = new Date();
      var timeStr = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      setStatus('live', 'Live from Google Sheets \u00B7 ' + timeStr);
    } else {
      throw new Error('Empty data');
    }
  } catch (e) {
    console.warn('Live data fetch failed, using fallback:', e);
    var isFile = window.location.protocol === 'file:';
    var msg = isFile
      ? 'Offline \u00B7 Deploy to GitHub Pages for live data'
      : 'Using cached data \u00B7 ' + e.message;
    setStatus('offline', msg);
  }
})();
</script>
